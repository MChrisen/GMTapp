name: Build desktop app

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: chmod +x scripts/package-mac-release.sh
      - name: Package Apple Silicon (M1/M2/M3)
        run: ./scripts/package-mac-release.sh arm64
      - name: Package Intel Mac
        run: ./scripts/package-mac-release.sh x64
      - run: ls -lh release/*.dmg release/*.zip
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: |
            release/*.dmg
            release/*.zip
          retention-days: 90

  build-win:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Package Windows x64
        shell: pwsh
        run: ./scripts/package-win-release.ps1
      - run: dir release
      - uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: release/*.exe
          retention-days: 90

  publish-release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mac-installer
          path: release
      - uses: actions/download-artifact@v4
        with:
          name: win-installer
          path: release
      - run: ls -lh release/
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Mac

            | Din Mac | Download |
            |---------|----------|
            | **Apple Silicon** (M1/M2/M3) | `GMT-Eksamenhjaelp-mac-arm64.dmg` eller `.zip` |
            | **Intel** | `GMT-Eksamenhjaelp-mac-x64.dmg` eller `.zip` |

            Hvis DMG ikke åbner: brug **.zip**. Første gang: **højreklik → Åbn → Åbn**.

            ## Windows

            Download **`GMT-Eksamenhjaelp-win-x64.exe`** — dobbeltklik (portable, ingen installation).

            Ved SmartScreen: **Flere oplysninger** → **Kør alligevel**.
          files: |
            release/GMT-Eksamenhjaelp-mac-arm64.dmg
            release/GMT-Eksamenhjaelp-mac-arm64.zip
            release/GMT-Eksamenhjaelp-mac-x64.dmg
            release/GMT-Eksamenhjaelp-mac-x64.zip
            release/GMT-Eksamenhjaelp-win-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build desktop app

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: chmod +x scripts/package-mac-release.sh
      - name: Package Apple Silicon (M1/M2/M3)
        run: ./scripts/package-mac-release.sh arm64
      - name: Package Intel Mac
        run: ./scripts/package-mac-release.sh x64
      - name: List release files
        run: ls -lh release/*.dmg release/*.zip
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: |
            release/*.dmg
            release/*.zip
          retention-days: 90

  publish-release:
    needs: [build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mac-installer
          path: release
      - run: ls -lh release/
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Mac — vælg den rigtige fil

            | Din Mac | Download |
            |---------|----------|
            | **Apple Silicon** (M1/M2/M3) | `GMT-Eksamenhjaelp-mac-arm64.dmg` |
            | **Intel** | `GMT-Eksamenhjaelp-mac-x64.dmg` |

            Hvis DMG ikke åbner: brug **.zip**, udpak, højreklik appen → **Åbn**.

            Første gang macOS advarer: **højreklik → Åbn → Åbn** (usigneret app).
          files: |
            release/GMT-Eksamenhjaelp-mac-arm64.dmg
            release/GMT-Eksamenhjaelp-mac-arm64.zip
            release/GMT-Eksamenhjaelp-mac-x64.dmg
            release/GMT-Eksamenhjaelp-mac-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
